<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <title>AetherSynth</title>
    <style>
      body {
        margin: 0;
        background-color: #020617;
        overflow: hidden;
        color: #f8fafc;
        font-family: 'Inter', sans-serif;
      }
      #hud {
        position: fixed;
        top: 20px;
        left: 20px;
        pointer-events: none;
        z-index: 10;
      }
      #hud h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.05em;
        color: #8b5cf6;
      }
      #hud p {
        margin: 5px 0 0 0;
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        opacity: 0.7;
      }
      #controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        z-index: 10;
      }
      .control-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid #8b5cf6;
        background: transparent;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .control-btn:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <h1>AetherSynth</h1>
      <p>Audio Reactive Visual Engine</p>
    </div>

    <div id="controls">
      <button class="control-btn" id="btn-reset" title="Reset View"></button>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
