<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        background: #020617;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        bottom: 40px;
        left: 40px;
        color: rgba(255, 255, 255, 0.8);
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        letter-spacing: 0.15em;
        z-index: 10;
      }
      #hud h1 {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 400;
        font-size: 2.5rem;
        margin: 0;
        text-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      }
      #hud p {
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        text-transform: uppercase;
        margin-top: 5px;
        opacity: 0.5;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 10px;
        display: inline-block;
      }
      body:hover #hud {
        opacity: 1;
      }

      /* Burger Menu */
      #burger {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 30px;
        height: 20px;
        cursor: pointer;
        z-index: 30;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      #burger span {
        display: block;
        width: 100%;
        height: 2px;
        background: white;
        opacity: 0.6;
        transition: 0.3s;
      }
      #burger:hover span {
        opacity: 1;
      }

      /* Controls Panel */
      #controls {
        position: fixed;
        top: 0;
        right: -300px;
        width: 250px;
        height: 100vh;
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px 20px;
        color: white;
        font-family: 'Inter', sans-serif;
        font-size: 0.8rem;
        z-index: 25;
        transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
      }
      #controls.open {
        right: 0;
      }
      .control-group {
        margin-bottom: 20px;
      }
      .control-group label {
        display: block;
        margin-bottom: 8px;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.65rem;
      }
      .control-group input {
        width: 100%;
        accent-color: #8B5CF6;
      }
      .control-header {
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 15px;
      }
      .palette-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .palette-btn {
        border: 1px solid rgba(255, 255, 255, 0.1);
        height: 30px;
        border-radius: 6px;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s;
      }
      .palette-btn:hover {
        transform: scale(1.05);
        border-color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <h1>Aether</h1>
      <p>decode the silence</p>
    </div>

    <div id="burger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div id="controls">
      <div class="control-header">Parameters</div>
      
      <div class="control-group">
        <label>Blob Size</label>
        <input type="range" id="size" min="0.5" max="3.0" step="0.1" value="1.5">
      </div>

      <div class="control-group">
        <label>Mountain Intensity</label>
        <input type="range" id="intensity" min="0" max="2.0" step="0.1" value="0.4">
      </div>

      <div class="control-group">
        <label>Rainbow Speed</label>
        <input type="range" id="rainbowSpeed" min="0" max="1.0" step="0.05" value="0.3">
      </div>

      <div class="control-group">
        <label>Audio Reactivity</label>
        <input type="range" id="audioSens" min="0" max="3.0" step="0.1" value="1.0">
      </div>

      <div class="control-group">
        <label>Bloom Glow</label>
        <input type="range" id="bloom" min="0" max="4.0" step="0.1" value="1.2">
      </div>

      <div class="control-header" style="font-size: 1.2rem; margin-top: 20px;">Palettes</div>
      <div class="palette-grid">
        <button class="palette-btn" data-palette="rainbow" title="Rainbow" style="background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff);"></button>
        <button class="palette-btn" data-palette="inferno" title="Inferno" style="background: linear-gradient(90deg, #f59e0b, #ef4444, #7f1d1d);"></button>
        <button class="palette-btn" data-palette="ocean" title="Ocean" style="background: linear-gradient(90deg, #0ea5e9, #2563eb, #1e3a8a);"></button>
        <button class="palette-btn" data-palette="ethereal" title="Ethereal" style="background: linear-gradient(90deg, #8b5cf6, #d946ef, #4c1d95);"></button>
        <button class="palette-btn" data-palette="solar" title="Solar" style="background: linear-gradient(90deg, #fde047, #fb923c, #b91c1c);"></button>
        <button class="palette-btn" data-palette="midnight" title="Midnight" style="background: linear-gradient(90deg, #1e1b4b, #312e81, #4338ca);"></button>
        <button class="palette-btn" data-palette="emerald" title="Emerald" style="background: linear-gradient(90deg, #065f46, #059669, #34d399);"></button>
        <button class="palette-btn" data-palette="supernova" title="Supernova" style="background: linear-gradient(90deg, #fafafa, #d4d4d4, #404040);"></button>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
